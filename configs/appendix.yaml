experiment:
  seed: 2024
  simulations: 20
  max_samples: 5000
  metric_samples: 1000
  figure_run_index: 0
  weeks: ["08", "12", "21", "25", "29", "32"]
  method_order: [GZO_NS, GZO_HS, ZO_TG, ZO_OG, ZO_OGVR]

problem:
  products: 10
  buyers: 40
  initial_price: 0.5
  outside_weight_per_product: 0.1
  lower_inventory_factor: 0.5
  upper_inventory_factor: 1.5
  cost_ratio_low: 2.0
  cost_ratio_middle: 1.0
  cost_ratio_high: 3.0
  rho_low: 0.25
  rho_high: 0.5

methods:
  GZO_NS:
    factory: ddp_pricing.methods.gzo_ns:GZONS
    params:
      mu0: 0.2
      mu_min: 0.0001
      beta0: 0.01
      beta_decay: 0.95
      mu_decay: 0.95
      alpha0: 0.0
      alpha_damping: 0.98
      batch_initial: 30
      batch_increment: 2
      decay_before_step: false
      behavior: equation
  GZO_HS:
    factory: ddp_pricing.methods.gzo_hs:GZOHS
    params:
      mu0: 0.2
      mu_min: 0.0001
      beta0: 0.01
      beta_decay: 0.95
      mu_decay: 0.95
      alpha0: 0.0
      alpha_damping: 0.98
      batch_initial: 30
      batch_increment: 2
      window: 1
      decay_before_step: false
      behavior: equation
  ZO_TG:
    factory: ddp_pricing.methods.zo_tg:ZOTG
    params:
      mu0: 0.2
      mu_min: 0.0001
      beta0: 0.01
      beta_decay: 0.95
      mu_decay: 0.95
      batch_initial: 30
      batch_increment: 2
      direction_covariance: identity_over_d
      decay_before_step: false
  ZO_OG:
    factory: ddp_pricing.methods.zo_og:ZOOG
    params:
      mu: 0.001
      beta0: 0.00001
      beta_decay: 1.0
      batch_initial: 30
      batch_increment: 2
      decay_before_step: false
  ZO_OGVR:
    factory: ddp_pricing.methods.zo_ogvr:ZOOGVR
    params:
      mu0: 0.2
      mu_min: 0.0001
      beta0: 0.001
      beta_decay: 0.95
      mu_decay: 0.95
      batch_initial: 30
      batch_increment: 2
      initial_samples: 20
      s_max: 10
      M: 0.1
      decay_before_step: false
